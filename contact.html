<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Le Chicaneur Numérique : Contact</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>

    <header>
        <nav>
            <div class="logo">
                <img src="./assets/Logo.png" alt="Harry Potter Logo" width="150">
            </div>
            <ul>
                <li><a href="./index.html">Accueil</a></li>
                <li><a href="./casting.html">Casting</a></li>
                <li><a href="./sortilèges.html">Sortilèges</a></li>
                <li><a href="./horcruxes.html" onclick="alert('Risque de spoil !');">Horcruxes</a></li>
                <li><a href="./relique_de_la_mort.html" onclick="alert('Risque de spoil !');">Relique de la mort</a></li>
                <li><a href="./contact.html">Contact</a></li>
            </ul>
        </nav>

    </header>
    <main>
        <section id="contact-section">
            <h2>Contactez-nous</h2>
            <p>Une question ? Une infos oublié ? Écrivez-nous !</p>

            <form class="contact-form" action="https://formspree.io/f/mkovyvlr" method="post" autocomplete="off">

                <input type="hidden" name="_next" value="https://tom-hubb.github.io/projet_web_tom_leroullier/">
                <input type="text" name="_gotcha" style="display:none;">

                <div class="form-group">
                    <label for="nom">Nom :</label>
                    <input type="text" id="nom" name="nom" placeholder="Votre Nom" required>
                </div>

                <div class="form-group">
                    <label for="prenom">Prénom :</label>
                    <input type="text" id="prenom" name="prenom" placeholder="Votre Prenom" required>
                </div>

                <div class="form-group">
                    <label for="email">Adresse email :</label>
                    <input type="email" id="email" name="email" placeholder="exemple@mail.com" required>
                </div>

                <div class="form-group">
                    <label for="message">Message :</label>
                    <textarea id="message" name="message" rows="5" placeholder="Votre message ici..." required></textarea>
                </div>

                <button type="submit" class="btn-envoyer">Envoyer</button>
            </form>
        </section>
    </main>
    <footer>
        <p>© 2026 – Le Chicaneur Numérique. Site réalisé par Tom Leroullier.</p>
        <p><a href="./contact.html">Nous Contacter</a></p>
    </footer>

    <script>
        document.querySelector('.contact-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const form = e.target;
        const fd = new FormData(form);

    try {
        const res = await fetch('https://formspree.io/f/mkovyvlr', {
        method: 'POST',
        body: fd,
        headers: { 'Accept': 'application/json' }
        });

        if (!res.ok) throw new Error('Erreur Formspree ' + res.status);

        // Succès : on vide le formulaire et on redirige côté client
        form.reset();
        window.location.href = './merci.html';
        } catch (err) {
            console.error(err);
            alert("Oups, l'envoi a échoué. Réessaie plus tard.");
        }
    });
</script>

</body>
</html>
